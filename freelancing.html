<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yugansh Suri — Portfolio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0b0f;
      --bg2: #111118;
      --bg3: #16161f;
      --accent: #f0a500;
      --text: #f0ede6;
      --muted: #7a7887;
      --border: rgba(240, 165, 0, 0.15);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 4rem;
      background: rgba(11, 11, 15, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.825rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 8rem 4rem 4rem;
      gap: 4rem;
      position: relative;
      overflow: hidden;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240, 165, 0, 0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(3rem, 6vw, 5.5rem);
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-desc {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 440px;
      margin-bottom: 2.5rem;
      font-weight: 300;
      line-height: 1.8;
    }

    .hero-ctas {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* BUTTONS */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #0b0b0f;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 165, 0, 0.25);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border: 0.5px solid rgba(240, 165, 0, 0.4);
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 2px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      background: rgba(240, 165, 0, 0.06);
    }

    .btn-resume {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.75rem;
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      color: var(--muted);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-decoration: none;
      border-radius: 2px;
      cursor: pointer;
      background: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .btn-resume:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240, 165, 0, 0.05);
    }

    /* HERO STATS */
    .hero-stats {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .stat-card {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 1.75rem 2rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .stat-card.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
    }

    .stat-num {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2.8rem;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.03em;
    }

    .stat-label {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .stat-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
      font-weight: 300;
    }

    /* SECTION BASE */
    section {
      padding: 6rem 4rem;
    }

    .section-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .section-tag::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }

    h2 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 3rem;
    }

    h2 span {
      color: var(--accent);
    }

    /* ABOUT */
    #about {
      background: var(--bg2);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 5rem;
      align-items: start;
    }

    .about-text p {
      color: var(--muted);
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 1.25rem;
    }

    .about-text p strong {
      color: var(--text);
      font-weight: 500;
    }

    .about-info {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.875rem;
    }

    .info-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      min-width: 72px;
    }

    .info-val {
      color: var(--muted);
    }

    .about-highlight {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
    }

    .about-highlight h3 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .cert-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .cert-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    .cert-list li::before {
      content: '→';
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 0.05rem;
    }

    /* EXPERIENCE */
    .exp-item {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 3rem;
      padding: 3rem 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .exp-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .exp-period {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .exp-company {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
    }

    .exp-role {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .exp-desc {
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 1.25rem;
      line-height: 1.8;
    }

    .achievement-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.85rem;
      background: rgba(240, 165, 0, 0.08);
      border: 0.5px solid rgba(240, 165, 0, 0.2);
      border-radius: 2px;
      font-size: 0.78rem;
      color: var(--accent);
    }

    /* SKILLS */
    #skills {
      background: var(--bg2);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .skill-group {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .skill-group.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .skill-group-title {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      padding: 0.3rem 0.7rem;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 300;
    }

    /* ACHIEVEMENTS */
    .achievements-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .ach-card {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2rem 1.75rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .ach-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .ach-card:hover {
      border-color: rgba(240, 165, 0, 0.35);
    }

    .ach-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(240, 165, 0, 0.1);
      border-radius: 4px;
      margin-bottom: 1.25rem;
      font-size: 1.1rem;
    }

    .ach-big {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .ach-desc {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    /* PROJECTS */
    #projects {
      background: var(--bg2);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    .project-card {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2.25rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .project-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .project-card:hover {
      border-color: rgba(240, 165, 0, 0.3);
    }

    .project-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at bottom right, rgba(240, 165, 0, 0.07), transparent 70%);
    }

    .project-period {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .project-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .project-desc {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.75;
    }

    /* CONTACT */
    #contact {
      padding: 6rem 4rem;
      position: relative;
    }

    #contact::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(240, 165, 0, 0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-intro {
      color: var(--muted);
      font-weight: 300;
      line-height: 1.85;
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }

    .contact-details {
      display: flex;
      flex-direction: column;
    }

    .contact-detail-row {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 1rem 0;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
    }

    .cd-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cd-val {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
    }

    a.cd-val:hover {
      color: var(--text);
    }

    .contact-dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #0b0b0f;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .contact-dl-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 165, 0, 0.25);
    }

    /* FORM */
    .contact-form-wrap {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .form-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .form-input {
      background: rgba(255, 255, 255, 0.03);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    .form-input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .form-input:focus {
      border-color: rgba(240, 165, 0, 0.4);
      background: rgba(240, 165, 0, 0.03);
    }

    .form-textarea {
      resize: vertical;
      min-height: 130px;
      line-height: 1.6;
    }

    .form-error {
      display: none;
      color: #e24b4a;
      font-size: 0.8rem;
      margin-bottom: 1rem;
    }

    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 2rem;
      background: var(--accent);
      color: #0b0b0f;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(240, 165, 0, 0.25);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .form-success {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
    }

    .fs-icon {
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .fs-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .fs-sub {
      color: var(--muted);
      font-weight: 300;
      font-size: 0.9rem;
    }

    /* FOOTER */
    footer {
      border-top: 0.5px solid rgba(255, 255, 255, 0.06);
      padding: 2rem 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ANIMATE */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav {
        padding: 1rem 2rem;
      }

      .nav-links {
        display: none;
      }

      #hero {
        grid-template-columns: 1fr;
        padding: 7rem 2rem 3rem;
        gap: 2.5rem;
      }

      .about-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .exp-item {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      section {
        padding: 4rem 2rem;
      }

      #contact {
        padding: 4rem 2rem;
      }

      footer {
        padding: 1.5rem 2rem;
        flex-direction: column;
        gap: 0.75rem;
        text-align: center;
      }
    }
  </style>
</head>

  <script>
    // Scroll reveal
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-up,.stat-card,.exp-item,.skill-group,.ach-card,.project-card').forEach(el => obs.observe(el));
    setTimeout(() => {
      document.querySelectorAll('.fade-up,.stat-card').forEach(el => el.classList.add('visible'));
    }, 100);

    // Contact form
    function submitForm() {
      const name = document.getElementById('fName').value.trim();
      const email = document.getElementById('fEmail').value.trim();
      const subject = document.getElementById('fSubject').value.trim();
      const message = document.getElementById('fMessage').value.trim();
      const errEl = document.getElementById('formError');
      const btn = document.getElementById('submitBtn');

      // IMPORTANT: Replace this with your formspree endpoint URL
      const FORMSPREE_URL = 'https://formspree.io/f/mojkrjqb';
      method = "POST";

      errEl.style.display = 'none';
      if (!name || !email || !message) {
        errEl.textContent = 'Please fill in your name, email, and message.';
        errEl.style.display = 'block'; return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.style.display = 'block'; return;
      }
      btn.disabled = true; btn.textContent = 'Sending...';

      fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: name,
          email: email,
          subject: subject,
          message: message
        })
      }).then(response => {
        if (response.ok) {
          document.getElementById('formBody').style.display = 'none';
          document.getElementById('formSuccess').style.display = 'block';
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              errEl.textContent = data["errors"].map(error => error["message"]).join(", ");
            } else {
              errEl.textContent = "Oops! There was a problem submitting your form";
            }
            errEl.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Send Message ↗';
          });
        }
      }).catch(error => {
        errEl.textContent = "Oops! There was a problem submitting your form";
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Send Message ↗';
      });
    }

    // Resume download
    function downloadResume() {
      alert("Resume will be avaiable soon");
    }
  </script>
